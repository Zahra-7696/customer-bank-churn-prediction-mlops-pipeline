<!DOCTYPE html>
<html>
<head>
    <title>Bank Churn Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            background: white;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #222;
        }
        p {
            color: #555;
            text-align: center;
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .full {
            grid-column: span 2;
        }
        button {
            grid-column: span 2;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1f6feb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1558b0;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            background: #eef6ff;
            border: 1px solid #cfe2ff;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bank Churn Prediction</h1>
        <p>Enter customer details to predict whether the customer is likely to churn.</p>

        <form method="POST" action="/predict-form">
            <div>
                <label>Credit Score</label>
                <input type="number" name="CreditScore" required>
            </div>

            <div>
                <label>Geography</label>
                <select name="Geography" required>
                    <option value="France">France</option>
                    <option value="Germany">Germany</option>
                    <option value="Spain">Spain</option>
                </select>
            </div>

            <div>
                <label>Gender</label>
                <select name="Gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div>
                <label>Age</label>
                <input type="number" name="Age" required>
            </div>

            <div>
                <label>Tenure</label>
                <input type="number" name="Tenure" required>
            </div>

            <div>
                <label>Balance</label>
                <input type="number" step="0.01" name="Balance" required>
            </div>

            <div>
                <label>Number of Products</label>
                <input type="number" name="NumOfProducts" required>
            </div>

            <div>
                <label>Has Credit Card</label>
                <select name="HasCrCard" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div>
                <label>Is Active Member</label>
                <select name="IsActiveMember" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div>
                <label>Estimated Salary</label>
                <input type="number" step="0.01" name="EstimatedSalary" required>
            </div>

            <button type="submit">Predict</button>
        </form>

        {% if result %}
        <div class="result">
            {{ result }}
        </div>
        {% endif %}
    </div>
</body>
</html>
