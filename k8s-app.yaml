apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-churn-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-churn
  template:
    metadata:
      labels:
        app: bank-churn
    spec:
      containers:
        - name: bank-churn
          image: bank-churn-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001

---
apiVersion: v1
kind: Service
metadata:
  name: bank-churn-service
spec:
  type: NodePort
  selector:
    app: bank-churn
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30007